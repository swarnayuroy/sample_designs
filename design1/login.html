<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="shared-style.css" />
    <link rel="stylesheet" href="login-style.css" />
    <link rel="stylesheet" href="forgot-password.css" />
    <link rel="stylesheet" href="loader-style.css" />
    <link rel="stylesheet" href="toast-message-style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css" />
    <script src="form.js" type="text/javascript"></script>
    <title>Account Login</title>
</head>

<body>
    <div class="page_toast_notification">
        <!-- <div class="page_toast_notification_content">
            <i class="fa fa-triangle-exclamation" style="font-size: 22px;"></i>
            <div class="page_toast_notification_message">
                <p class="page_toast_notification_text">Oops! Internal server error.</p>
            </div>
        </div> -->
        <div class="page_toast_notification_content">
            <i class="fa-solid fa-circle-check"></i>
            <div class="page_toast_notification_message">
                <p class="page_toast_notification_text">Account has been created.</p>
            </div>
        </div>
        <button class="page_toast_notification_close_btn" onclick="hideToast()">
            <i class="fa-solid fa-circle-xmark" style="font-size: 15px;"></i>
        </button>
        <script type="text/javascript">
            setTimeout(hideToast, 5000)
        </script>
    </div>
    <div class="form-container">
        <form class="form_signIn">
            <h2 class="form_signIn_header">Sign In</h2>
            <div class="form_signIn_email">
                <label class="form_signIn_label">Email</label>
                <div class="form_signIn_input">
                    <input type="email" name="email" autocomplete="off" required />
                </div>
                <p class="form_validation_message"><span>Email validation</span></p>
            </div>
            <div class="form_signIn_password">
                <label class="form_signIn_label">Password</label>
                <div class="form_signIn_input">
                    <input type="password" name="password" id="signIn_password_input" required />
                    <i class="fa-solid fa-eye" id="form_signIn_password_show" onclick="showPassword('signIn')"></i>
                    <i class="fa-solid fa-eye-slash" id="form_signIn_password_hide"
                        onclick="hidePassword('signIn')"></i>
                </div>
                <p class="form_validation_message"><span>Password validation</span></p>
            </div>
            <div class="form_signIn_btn">
                <!-- <button type="submit">LogIn</button> -->
                <input type="submit" value="Login" class="button" />
            </div>
            <div class="form_signIn_other_actions">
                <p><a class="forgot_passowrd" onclick="displayForgotPasswordForm()">Forgot Password?</a></p>
                <!-- <p><button class="register_here" type="button" onclick="displayRegistrationForm()">Don't have an account? <u>Sign Up</u></button></p> -->
                <p><a class="register_here" onclick="displayRegistrationForm()">Don't have an account? <u>Sign
                            Up</u></a></p>
            </div>
        </form>

        <form class="form_registration" style="display: none;">
            <h2 class="form_registration_header">Sign Up</h2>
            <div class="form_registration_name">
                <label class="form_registration_label">Name</label>
                <div class="form_registration_input">
                    <input type="text" name="text" autocomplete="off" required />
                </div>
                <p class="form_validation_message"><span>Name Required</span></p>
            </div>
            <div class="form_registration_email">
                <label class="form_registration_label">Email</label>
                <div class="form_registration_input">
                    <input type="email" name="email" autocomplete="off" required />
                </div>
                <p class="form_validation_message"><span>Email validation</span></p>
            </div>
            <div class="form_registration_password">
                <label class="form_registration_label">Password</label>
                <div class="form_registration_input">
                    <input type="password" name="password" id="registration_password_input" required />
                    <i class="fa-solid fa-eye" id="form_registration_password_show"
                        onclick="showPassword('registration')"></i>
                    <i class="fa-solid fa-eye-slash" id="form_registration_password_hide"
                        onclick="hidePassword('registration')"></i>
                </div>
                <p class="form_validation_message"><span>Password validation</span></p>
            </div>
            <div class="form_registration_btn">
                <!-- <button type="submit">Submit</button> -->
                <input type="submit" value="Submit" class="button" />
            </div>
            <div class="form_registration_other_actions">
                <!-- <p><button class="login_here" type="button" onclick="displaySignInForm()">Have an account? <u>LogIn</u></button></p> -->
                <p><a class="login_here" onclick="displaySignInForm()">Have an account? <u>LogIn</u></a></p>
            </div>
        </form>

        <form class="form_forgot_password" style="display: none;">
            <h2 class="form_forgotPassword_header">Forgot Password</h2>
            <div class="form_userEmail_container">
                <label class="form_userEmail_label">Email</label>
                <div class="form_userEmail_input">
                    <input type="email" name="email" autocomplete="off" required />                    
                </div>
                <p class="form_validation_message"><span>Email validation</span></p>
            </div>

            <!-- <div class="form_otp_container">
                <label class="form_otp_label">Enter OTP</label>
                <div class="form_otp_input">
                    <input type="text" name="otp" autocomplete="off" required  style="text-align: center;"/>
                </div>
            </div> -->

            <!-- <div class="form_setPassword_container">
                <div class="form_newPassword_container">
                    <label class="form_newPassword_label">New Password</label>
                    <div class="form_newPassword_input">
                        <input type="password" name="password" id="set_newPassword_input" required />
                        <i class="fa-solid fa-eye" id="set_newPassword_show"
                            onclick="showPassword('setNewPassword')"></i>
                        <i class="fa-solid fa-eye-slash" id="set_newPassword_hide"
                            onclick="hidePassword('setNewPassword')"></i>
                    </div>
                    <p class="form_validation_message"><span>Password validation</span></p>
                </div>

                <div class="form_confirmPassword_container">
                    <label class="form_confirmPassword_label">Confirm Password</label>
                    <div class="form_confirmPassword_input">
                        <input type="text" name="confirm_password" id="set_confirmPassword_input" required />
                    </div>
                    <p class="form_validation_message"><span>Password validation</span></p>
                </div>
            </div> -->

            <div class="form_setPassword_btn">
                <input type="submit" value="Submit" class="button" />
            </div>
            <div class="form_other_actions">
                <p><a class="login_here" onclick="backToSignInForm()">
                        << Back to login </a>
                </p>
            </div>
        </form>
    </div>
    <div class="page_loader">
        <div class="loader_content">
            <img src="animation/loader1.gif" alt="Loading..." />
        </div>
    </div>
</body>

</html>
